trigger:
  batch: true
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md

pr: none

variables:
  - name: "dotnet.sdk.version"
    value: "10.0.x"
  - name: "dotnet.cache.disable"
    value: "false"
  - name: "BuildConfiguration"
    value: "Debug"
  - name: "SolutionFile"
    value: "Keeptrack.slnx"
  - name: "TestProjects"
    value: "test/*Tests/*.csproj"

stages:
  - stage: "unit_testing"
    displayName: "Unit testing"
    jobs:
      - job: "linux_unittests"
        displayName: "Unit tests run on Linux"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: UseDotNet@2
            displayName: "Use .NET Core SDK"
            inputs:
              packageType: "sdk"
              version: $(dotnet.sdk.version)
          - task: DotNetCoreCLI@2
            displayName: "Build .NET solution"
            inputs:
              command: "build"
              projects: "$(SolutionFile)"
              arguments: "-c $(BuildConfiguration)"
            env:
              DOTNET_CLI_TELEMETRY_OPTOUT: 1
              DOTNET_NOLOGO: 1
          - task: CmdLine@2
            displayName: "Run .NET test projects"
            inputs:
              script: >
                dotnet test
                --configuration $(BuildConfiguration)
                -- --filter-query "/[Category=UnitTests]"
            env:
              AllowedOrigins__0: "5207"
              Features__IsScalarEnabled: true
              Features__IsHttpsRedirectionEnabled: false
              ASPNETCORE_ENVIRONMENT: Development
              DOTNET_CLI_TELEMETRY_OPTOUT: 1
              DOTNET_NOLOGO: 1

  - stage: "integration_testing"
    displayName: "Integration testing"
    dependsOn: []
    condition: eq(variables['RunIntegrationTestingStage'], true)
    jobs:
      - job: "windows_integrationtests"
        displayName: "Windows CI"
        pool:
          vmImage: "windows-latest"
        steps:
          - task: UseDotNet@2
            displayName: "Use .NET Core SDK"
            inputs:
              packageType: "sdk"
              version: $(dotnet.sdk.version)
          - task: PowerShell@2
            displayName: "Start local MongoDB"
            inputs:
              targetType: "inline"
              script: |
                Write-Host "Starting MongoDB"
                md log
                md data
                Start-Process -FilePath "mongod" -ArgumentList "--logpath log/mongod.log", "--dbpath data", "--port 27017" -WindowStyle Hidden
          - task: DotNetCoreCLI@2
            displayName: "Restore .NET packages"
            inputs:
              command: "restore"
              projects: "$(SolutionFile)"
              feedsToUse: "select"
              noCache: $(dotnet.cache.disable)
            env:
              DOTNET_CLI_TELEMETRY_OPTOUT: 1
              DOTNET_NOLOGO: 1
          - task: DotNetCoreCLI@2
            displayName: "Build .NET solution"
            inputs:
              command: "build"
              projects: "$(SolutionFile)"
              arguments: "-c $(BuildConfiguration)"
            env:
              DOTNET_CLI_TELEMETRY_OPTOUT: 1
              DOTNET_NOLOGO: 1
          - task: DotNetCoreCLI@2
            displayName: "Run .NET test projects"
            inputs:
              command: "test"
              projects: "$(TestProjects)"
              arguments: |
                --configuration $(BuildConfiguration)
                --report-xunit-trx --coverage --coverage-output-format cobertura
                -- --filter-query "/[(Category=UnitTests)|(Mode=Readonly)]"
            env:
              AllowedOrigins__0: "5207"
              Features__IsScalarEnabled: true
              Features__IsHttpsRedirectionEnabled: false
              ASPNETCORE_ENVIRONMENT: Development
              DOTNET_CLI_TELEMETRY_OPTOUT: 1
              DOTNET_NOLOGO: 1
          - task: PublishBuildArtifacts@1
            displayName: "Publish artifacts"
            condition: failed()
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)"
              ArtifactName: "drop"
              publishLocation: "Container"
