trigger:
  batch: false
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md

pr: none

variables:
  # application path
  - name: "dotnet.integrationtestprojects"
    value: "test/*IntegrationTests/*.csproj"
  # specific variables
  - name: "dotnet.buildconfiguration"
    value: "Release"
  - name: "dotnet.sdk.version"
    value: "10.0.x"

pool:
  vmImage: "ubuntu-latest"

steps:
  - task: UseDotNet@2
    displayName: "Use .NET Core SDK"
    inputs:
      packageType: "sdk"
      version: $(dotnet.sdk.version)
  - task: DotNetCoreCLI@2
    displayName: "Create integration test libraries"
    inputs:
      command: "publish"
      projects: "$(dotnet.integrationtestprojects)"
      arguments: "-c Debug -o $(Build.ArtifactStagingDirectory)/testlibraries"
      publishWebProjects: false
      zipAfterPublish: false
      modifyOutputPath: false
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      COREHOST_TRACE: 0
  - task: DotNetCoreCLI@2
    displayName: "Create ASP.NET API artifacts"
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "src/WebApi/WebApi.csproj"
      arguments: "-c $(dotnet.buildconfiguration) -o $(Build.ArtifactStagingDirectory)/aspnetapi"
      modifyOutputPath: false
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      COREHOST_TRACE: 0
  # Save artifacts
  - task: PublishBuildArtifacts@1
    displayName: "Save artifacts"
    inputs:
      PathtoPublish: $(Build.ArtifactStagingDirectory)
      ArtifactName: "drop"
      publishLocation: "Container"
